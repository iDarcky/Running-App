<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RedLine</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23000000'/%3E%3Cpath d='M170 96h100l-50 256h170v80H120V96z' fill='%23EE0000'/%3E%3C/svg%3E" />
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://assets.vercel.com/fonts/font-stack.css">
    <style>
      :root {
        --geist-background: #ffffff;
        --geist-foreground: #000000;
        --geist-selection: #f81ce5;
        --accents-1: #fafafa;
        --accents-2: #eaeaea;
        --accents-3: #999999;
        --accents-4: #888888;
        --accents-5: #666666;
        --accents-6: #444444;
        --accents-7: #333333;
        --accents-8: #111111;
        
        --brand-red: #EE0000;
        --brand-red-light: #FFE5E5;
      }

      .dark {
        --geist-background: #000000;
        --geist-foreground: #ffffff;
        --geist-selection: #f81ce5;
        --accents-1: #111111;
        --accents-2: #333333;
        --accents-3: #444444;
        --accents-4: #666666;
        --accents-5: #888888;
        --accents-6: #999999;
        --accents-7: #eaeaea;
        --accents-8: #fafafa;
        
        --brand-red: #FF3333;
        --brand-red-light: #330000;
      }

      body {
        font-family: 'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background-color: var(--geist-background);
        color: var(--geist-foreground);
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.2s ease, color 0.2s ease;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      /* Geist Grid Background */
      .geist-grid {
        background-image: radial-gradient(var(--accents-2) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--geist-background);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accents-2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accents-3);
      }
      
      .animate-fade-in {
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .h-safe {
        height: calc(100vh + env(safe-area-inset-top) + env(safe-area-inset-bottom));
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          background: 'var(--geist-background)',
          foreground: 'var(--geist-foreground)',
          accents: {
            1: 'var(--accents-1)',
            2: 'var(--accents-2)',
            3: 'var(--accents-3)',
            4: 'var(--accents-4)',
            5: 'var(--accents-5)',
            6: 'var(--accents-6)',
            7: 'var(--accents-7)',
            8: 'var(--accents-8)',
          },
          primary: {
            DEFAULT: 'var(--brand-red)',
            light: 'var(--brand-red-light)',
          }
        },
        fontFamily: {
          sans: ['Geist Sans', 'sans-serif'],
          mono: ['Geist Mono', 'monospace'],
        }
      }
    }
  }
</script>
</head>
  <body class="geist-grid">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
