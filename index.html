<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6750A4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>StrideAI Coach</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Theme - Material 3 Purple */
        --md-sys-color-primary: #6750A4;
        --md-sys-color-on-primary: #FFFFFF;
        --md-sys-color-primary-container: #EADDFF;
        --md-sys-color-on-primary-container: #21005D;
        
        --md-sys-color-secondary: #625B71;
        --md-sys-color-on-secondary: #FFFFFF;
        --md-sys-color-secondary-container: #E8DEF8;
        --md-sys-color-on-secondary-container: #1D192B;
        
        --md-sys-color-tertiary: #7D5260;
        --md-sys-color-on-tertiary: #FFFFFF;
        --md-sys-color-tertiary-container: #FFD8E4;
        --md-sys-color-on-tertiary-container: #31111D;
        
        --md-sys-color-error: #B3261E;
        --md-sys-color-on-error: #FFFFFF;
        --md-sys-color-error-container: #F9DEDC;
        --md-sys-color-on-error-container: #410E0B;
        
        --md-sys-color-background: #FEF7FF;
        --md-sys-color-on-background: #1D1B20;
        
        --md-sys-color-surface: #FEF7FF;
        --md-sys-color-on-surface: #1D1B20;
        --md-sys-color-surface-variant: #E7E0EC;
        --md-sys-color-on-surface-variant: #49454F;
        
        --md-sys-color-outline: #79747E;
        --md-sys-color-outline-variant: #CAC4D0;
        
        --md-sys-color-surface-container-low: #F7F2FA;
        --md-sys-color-surface-container: #F3EDF7;
        --md-sys-color-surface-container-high: #ECE6F0;
        --md-sys-color-surface-container-highest: #E6E0E9;
      }

      .dark {
        /* Dark Theme - Material 3 Purple */
        --md-sys-color-primary: #D0BCFF;
        --md-sys-color-on-primary: #381E72;
        --md-sys-color-primary-container: #4F378B;
        --md-sys-color-on-primary-container: #EADDFF;
        
        --md-sys-color-secondary: #CCC2DC;
        --md-sys-color-on-secondary: #332D41;
        --md-sys-color-secondary-container: #4A4458;
        --md-sys-color-on-secondary-container: #E8DEF8;
        
        --md-sys-color-tertiary: #EFB8C8;
        --md-sys-color-on-tertiary: #492532;
        --md-sys-color-tertiary-container: #633B48;
        --md-sys-color-on-tertiary-container: #FFD8E4;
        
        --md-sys-color-error: #F2B8B5;
        --md-sys-color-on-error: #601410;
        --md-sys-color-error-container: #8C1D18;
        --md-sys-color-on-error-container: #F9DEDC;
        
        /* Pure Black Background */
        --md-sys-color-background: #000000;
        --md-sys-color-on-background: #E6E1E5;
        
        /* Darker Surfaces to complement pure black */
        /* Using slightly elevated grays for surfaces to stand out against black */
        --md-sys-color-surface: #090909;
        --md-sys-color-on-surface: #E6E1E5;
        --md-sys-color-surface-variant: #49454F;
        --md-sys-color-on-surface-variant: #CAC4D0;
        
        --md-sys-color-outline: #938F99;
        --md-sys-color-outline-variant: #49454F;
        
        /* Darker Containers for depth on black */
        --md-sys-color-surface-container-low: #101010;
        --md-sys-color-surface-container: #161616;
        --md-sys-color-surface-container-high: #202020;
        --md-sys-color-surface-container-highest: #2A2A2A;
      }

      body {
        font-family: 'Roboto Flex', 'Roboto', sans-serif;
        background-color: var(--md-sys-color-background);
        color: var(--md-sys-color-on-background);
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--md-sys-color-surface-container); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--md-sys-color-outline-variant); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--md-sys-color-outline); 
      }
      
      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.2, 0.0, 0, 1.0);
      }
      
      .animate-slide-down {
        animation: slideDown 0.3s cubic-bezier(0.2, 0.0, 0, 1.0);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideDown {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: {
            DEFAULT: 'var(--md-sys-color-primary)',
            on: 'var(--md-sys-color-on-primary)',
            container: 'var(--md-sys-color-primary-container)',
            'on-container': 'var(--md-sys-color-on-primary-container)',
          },
          secondary: {
            DEFAULT: 'var(--md-sys-color-secondary)',
            on: 'var(--md-sys-color-on-secondary)',
            container: 'var(--md-sys-color-secondary-container)',
            'on-container': 'var(--md-sys-color-on-secondary-container)',
          },
          tertiary: {
            DEFAULT: 'var(--md-sys-color-tertiary)',
            on: 'var(--md-sys-color-on-tertiary)',
            container: 'var(--md-sys-color-tertiary-container)',
            'on-container': 'var(--md-sys-color-on-tertiary-container)',
          },
          error: {
            DEFAULT: 'var(--md-sys-color-error)',
            on: 'var(--md-sys-color-on-error)',
            container: 'var(--md-sys-color-error-container)',
            'on-container': 'var(--md-sys-color-on-error-container)',
          },
          surface: {
            DEFAULT: 'var(--md-sys-color-surface)',
            on: 'var(--md-sys-color-on-surface)',
            variant: 'var(--md-sys-color-surface-variant)',
            'on-variant': 'var(--md-sys-color-on-surface-variant)',
            container: {
                low: 'var(--md-sys-color-surface-container-low)',
                DEFAULT: 'var(--md-sys-color-surface-container)',
                high: 'var(--md-sys-color-surface-container-high)',
                highest: 'var(--md-sys-color-surface-container-highest)',
            }
          },
          outline: {
            DEFAULT: 'var(--md-sys-color-outline)',
            variant: 'var(--md-sys-color-outline-variant)',
          }
        },
        borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
        }
      }
    }
  }
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
