<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#D32F2F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RedLine</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Theme - Red & White (Shoe Inspired) */
        /* Primary Red - like the Adidas stripes */
        --md-sys-color-primary: #D32F2F;
        --md-sys-color-on-primary: #FFFFFF;
        --md-sys-color-primary-container: #FFDAD6;
        --md-sys-color-on-primary-container: #410002;
        
        /* Secondary - Cool Gray/Silver like mesh details */
        --md-sys-color-secondary: #5F6368; 
        --md-sys-color-on-secondary: #FFFFFF;
        --md-sys-color-secondary-container: #F2F2F2;
        --md-sys-color-on-secondary-container: #1D1D1D;
        
        /* Tertiary - Black for sharp contrast accents */
        --md-sys-color-tertiary: #000000;
        --md-sys-color-on-tertiary: #FFFFFF;
        --md-sys-color-tertiary-container: #EEEEEE;
        --md-sys-color-on-tertiary-container: #000000;
        
        --md-sys-color-error: #BA1A1A;
        --md-sys-color-on-error: #FFFFFF;
        --md-sys-color-error-container: #FFDAD6;
        --md-sys-color-on-error-container: #410002;
        
        /* Backgrounds - Clean White */
        --md-sys-color-background: #FFFFFF;
        --md-sys-color-on-background: #191C1C;
        
        /* Surfaces - Very subtle off-whites to keep it clean */
        --md-sys-color-surface: #FFFFFF;
        --md-sys-color-on-surface: #191C1C;
        --md-sys-color-surface-variant: #E1E3E3;
        --md-sys-color-on-surface-variant: #444748;
        
        --md-sys-color-outline: #747775;
        --md-sys-color-outline-variant: #C4C7C5;
        
        --md-sys-color-surface-container-low: #F7F9F9;
        --md-sys-color-surface-container: #F3F5F5;
        --md-sys-color-surface-container-high: #EDEFF0;
        --md-sys-color-surface-container-highest: #E7E9EA;
      }

      .dark {
        /* Dark Theme - Black & Red */
        --md-sys-color-primary: #FF5449; 
        --md-sys-color-on-primary: #690005;
        --md-sys-color-primary-container: #93000A;
        --md-sys-color-on-primary-container: #FFDAD6;
        
        --md-sys-color-secondary: #C6C6C6;
        --md-sys-color-on-secondary: #303030;
        --md-sys-color-secondary-container: #3F4040;
        --md-sys-color-on-secondary-container: #E2E2E2;
        
        --md-sys-color-tertiary: #FFFFFF;
        --md-sys-color-on-tertiary: #000000;
        --md-sys-color-tertiary-container: #444444;
        --md-sys-color-on-tertiary-container: #FFFFFF;
        
        --md-sys-color-error: #FFB4AB;
        --md-sys-color-on-error: #690005;
        --md-sys-color-error-container: #93000A;
        --md-sys-color-on-error-container: #FFDAD6;
        
        /* Deep Black Background */
        --md-sys-color-background: #000000;
        --md-sys-color-on-background: #E1E3E3;
        
        --md-sys-color-surface: #090909;
        --md-sys-color-on-surface: #E1E3E3;
        --md-sys-color-surface-variant: #3F484A;
        --md-sys-color-on-surface-variant: #C4C7C5;
        
        --md-sys-color-outline: #8E918F;
        --md-sys-color-outline-variant: #444748;
        
        --md-sys-color-surface-container-low: #101010;
        --md-sys-color-surface-container: #161616;
        --md-sys-color-surface-container-high: #202020;
        --md-sys-color-surface-container-highest: #2A2A2A;
      }

      body {
        font-family: 'Roboto Flex', 'Roboto', sans-serif;
        background-color: var(--md-sys-color-background);
        color: var(--md-sys-color-on-background);
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--md-sys-color-surface-container); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--md-sys-color-outline-variant); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--md-sys-color-outline); 
      }
      
      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.2, 0.0, 0, 1.0);
      }
      
      .animate-slide-down {
        animation: slideDown 0.3s cubic-bezier(0.2, 0.0, 0, 1.0);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@18.3.1",
    "react/": "https://aistudiocdn.com/react@18.3.1/",
    "react-dom": "https://aistudiocdn.com/react-dom@18.3.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@18.3.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@2.10.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@0.263.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: {
            DEFAULT: 'var(--md-sys-color-primary)',
            on: 'var(--md-sys-color-on-primary)',
            container: 'var(--md-sys-color-primary-container)',
            'on-container': 'var(--md-sys-color-on-primary-container)',
          },
          secondary: {
            DEFAULT: 'var(--md-sys-color-secondary)',
            on: 'var(--md-sys-color-on-secondary)',
            container: 'var(--md-sys-color-secondary-container)',
            'on-container': 'var(--md-sys-color-on-secondary-container)',
          },
          tertiary: {
            DEFAULT: 'var(--md-sys-color-tertiary)',
            on: 'var(--md-sys-color-on-tertiary)',
            container: 'var(--md-sys-color-tertiary-container)',
            'on-container': 'var(--md-sys-color-on-tertiary-container)',
          },
          error: {
            DEFAULT: 'var(--md-sys-color-error)',
            on: 'var(--md-sys-color-on-error)',
            container: 'var(--md-sys-color-error-container)',
            'on-container': 'var(--md-sys-color-on-error-container)',
          },
          surface: {
            DEFAULT: 'var(--md-sys-color-surface)',
            on: 'var(--md-sys-color-on-surface)',
            variant: 'var(--md-sys-color-surface-variant)',
            'on-variant': 'var(--md-sys-color-on-surface-variant)',
            container: {
                low: 'var(--md-sys-color-surface-container-low)',
                DEFAULT: 'var(--md-sys-color-surface-container)',
                high: 'var(--md-sys-color-surface-container-high)',
                highest: 'var(--md-sys-color-surface-container-highest)',
            }
          },
          outline: {
            DEFAULT: 'var(--md-sys-color-outline)',
            variant: 'var(--md-sys-color-outline-variant)',
          }
        },
        borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem',
        }
      }
    }
  }
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
